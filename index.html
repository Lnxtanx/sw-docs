    <meta name="author" content="Schema Weaver" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0f172a" />
    <title>Schema Weaver Docs</title>
    <meta
      name="description"
      content="Official Schema Weaver documentation for product guides, Data Explorer workflows, SQL Editor usage, APIs, and schema management."
    />

    <link rel="canonical" href="https://docs.schemaweaver.vivekmind.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Schema Weaver Docs" />
    <meta property="og:title" content="Schema Weaver Docs" />
    <meta
      property="og:description"
      content="Official Schema Weaver documentation for product guides, Data Explorer workflows, SQL Editor usage, APIs, and schema management."
    />
    <meta property="og:url" content="https://docs.schemaweaver.vivekmind.com/" />
    <meta property="og:image" content="https://docs.schemaweaver.vivekmind.com/og-image.svg" />
    <meta property="og:image:alt" content="Schema Weaver Docs social preview" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Schema Weaver Docs" />
    <meta
      name="twitter:description"
      content="Official Schema Weaver documentation for product guides, Data Explorer workflows, SQL Editor usage, APIs, and schema management."
    />
    <meta name="twitter:image" content="https://docs.schemaweaver.vivekmind.com/og-image.svg" />
    <meta name="twitter:image:alt" content="Schema Weaver Docs social preview" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Schema Weaver Docs",
        "url": "https://docs.schemaweaver.vivekmind.com",
        "description": "Official documentation for Schema Weaver covering guides, APIs, Data Explorer, and SQL Editor workflows.",
        "publisher": {
          "@type": "Organization",
          "name": "Schema Weaver",
          "url": "https://schemaweaver.vivekmind.com"
        }
      }
    </script>

    <script>
      (function () {
        var t = localStorage.getItem('sw-docs-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
