<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schema Weaver Docs</title>
    <meta name="description" content="Official documentation for Schema Weaver and Resona AI — database schema management, migrations, and AI-powered data exploration." />
    <!-- Prevent dark mode flash: apply theme before render -->
    <script>
      (function () {
        var t = localStorage.getItem('sw-docs-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
