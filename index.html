<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schema Weaver Docs</title>
    <meta name="description" content="Official documentation for Schema Weaver and Resona AI — database schema management, migrations, and AI-powered data exploration." />

    <!-- Canonical (overridden per-page by React) -->
    <link rel="canonical" href="https://docs.schemaweaver.com/" />

    <!-- Open Graph defaults (overridden per-page by React) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Schema Weaver Docs" />
    <meta property="og:title"       content="Schema Weaver Docs" />
    <meta property="og:description" content="Official documentation for Schema Weaver and Resona AI — database schema management, migrations, and AI-powered data exploration." />
    <meta property="og:url"         content="https://docs.schemaweaver.com/" />
    <meta property="og:image"       content="https://docs.schemaweaver.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@schemaweaver" />
    <meta name="twitter:title"       content="Schema Weaver Docs" />
    <meta name="twitter:description" content="Official documentation for Schema Weaver and Resona AI — database schema management, migrations, and AI-powered data exploration." />
    <meta name="twitter:image"       content="https://docs.schemaweaver.com/og-image.png" />

    <!-- WebSite + SearchAction structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Schema Weaver Docs",
      "url": "https://docs.schemaweaver.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://docs.schemaweaver.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Prevent dark mode flash: apply theme before render -->
    <script>
      (function () {
        var t = localStorage.getItem('sw-docs-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
