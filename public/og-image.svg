<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Schema Weaver Docs</title>
  <desc id="desc">Official documentation for Schema Weaver, including guides, APIs, Data Explorer, and SQL Editor workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eff6ff" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="120" r="190" fill="#38bdf8" fill-opacity="0.14" />
  <circle cx="180" cy="560" r="220" fill="#60a5fa" fill-opacity="0.10" />
  <rect x="64" y="64" width="1072" height="502" rx="28" fill="url(#panel)" stroke="#bfdbfe" stroke-opacity="0.18" />

  <text x="112" y="154" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="1.5">SCHEMA WEAVER</text>
  <text x="112" y="252" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="82" font-weight="800">Docs</text>
  <text x="112" y="322" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="500">
    Guides, APIs, Data Explorer, SQL Editor, and product workflows.
  </text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    <rect x="112" y="388" width="184" height="58" rx="29" fill="#0b1220" fill-opacity="0.55" stroke="#60a5fa" stroke-opacity="0.45" />
    <text x="154" y="425" fill="#eff6ff">Guides</text>

    <rect x="320" y="388" width="136" height="58" rx="29" fill="#0b1220" fill-opacity="0.55" stroke="#60a5fa" stroke-opacity="0.45" />
    <text x="362" y="425" fill="#eff6ff">APIs</text>

    <rect x="480" y="388" width="256" height="58" rx="29" fill="#0b1220" fill-opacity="0.55" stroke="#60a5fa" stroke-opacity="0.45" />
    <text x="522" y="425" fill="#eff6ff">Data Explorer</text>

    <rect x="760" y="388" width="194" height="58" rx="29" fill="#0b1220" fill-opacity="0.55" stroke="#60a5fa" stroke-opacity="0.45" />
    <text x="802" y="425" fill="#eff6ff">SQL Editor</text>
  </g>

  <text x="112" y="515" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">
    docs.schemaweaver.vivekmind.com
  </text>
</svg>
